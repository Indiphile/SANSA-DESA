<VirtualHost *:80>
    ServerAdmin ingqambuza@sansa.org.za
    ServerName desa.sansa.org.za
    Redirect permanent / https://desa.sansa.org.za/
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin ingqambuza@sansa.org.za
    ServerName desa.sansa.org.za
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /home/sansa/ssl/sansa-public.crt
    SSLCertificateKeyFile /home/sansa/ssl/sansa-private.key
    
    # SSL Protocol settings (equivalent to Nginx SSL settings)
    SSLProtocol TLSv1.2 TLSv1.3
    SSLHonorCipherOrder on
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    
    # HSTS (equivalent to Nginx HSTS setting)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    
    # DocumentRoot for WordPress if needed
    DocumentRoot /var/www/html/wordpress
    
    # WordPress Directory if needed
    <Directory /var/www/html/wordpress>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Enable proxy preservation
    ProxyPreserveHost On
    
    # Default route to Explorer
    ProxyPass /products http://localhost:84/products
    ProxyPassReverse /products http://localhost:84/products

    # STAC
    ProxyPass /collections/stac http://localhost:84/collections/stac
    ProxyPassReverse /collections/stac http://localhost:84/collections/stac

    # Product list
    ProxyPass /products.txt http://localhost:84/products.txt
    ProxyPassReverse /products.txt http://localhost:84/products.txt

    #Product definition
    ProxyPass /products.odc-product.yaml http://localhost:84/products.odc-product.yaml  
    ProxyPassReverse /products.odc-product.yaml http://localhost:84/products.odc-product.yaml
  
    #eo
    ProxyPass /metadata-types/eo http://localhost:84/metadata-types/eo
    ProxyPassReverse /metadata-types/eo http://localhost:84/metadata-types/eo

    #eo3
    ProxyPass /metadata-types/eo3 http://localhost:84/metadata-types/eo3
    ProxyPassReverse metadata-types/eo3 http://localhost:84/metadata-types/eo3

    #telemetry
    ProxyPass /metadata-types/telemetry http://localhost:84/metadata-types/telemetry
    ProxyPassReverse /metadata-types/telemetry http://localhost:84/metadata-types/telemetry

    #arrival
    ProxyPass /arrivals http://localhost:84/arrivals
    ProxyPassReverse /arrivals http://localhost:84/arrivals

    #storage
    ProxyPass /audit/storage http://localhost:84/audit/storage
    ProxyPassReverse /audit/storage http://localhost:84/audit/storage

    #datasets-metadata
    ProxyPass /audit/datasets-metadata http://localhost:84/audit/datasets-metadata
    ProxyPassReverse /audit/datasets-metadata http://localhost:84/audit/datasets-metadata

    #product-overview
    ProxyPass /audit/product-overview http://localhost:84/audit/product-overview
    ProxyPassReverse /audit/product-overview http://localhost:84/audit/product-overview

    #dataset-counts
    ProxyPass /audit/dataset-counts http://localhost:84/audit/dataset-counts
    ProxyPassReverse /audit/dataset-counts http://localhost:84/audit/dataset-counts

    #about
    ProxyPass /about http://localhost:84/about
    ProxyPassReverse /about http://localhost:84/about


    # Static assets for Explorer
    ProxyPass /static http://localhost:84/static
    ProxyPassReverse /static http://localhost:84/static
    ProxyPass /_theme http://localhost:84/_theme
    ProxyPassReverse /_theme http://localhost:84/_theme
    
    # JupyterHub Compute path
    ProxyPass /compute/ http://desa.sansa.org.za:8001/compute/
    ProxyPassReverse /compute/ http://desa.sansa.org.za:8001/compute/
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /compute/(.*) ws://localhost:8001/compute/$1 [P,L]
    
    # JupyterHub Jupyter path (legacy)
    ProxyPass /jupyter/ http://desa.sansa.org:8001/compute/
    ProxyPassReverse /jupyter/ http://desa.sansa.org.za:8001/compute/

    # TerriaMap configurations and assets
    # Main config files
    ProxyPass /config.json http://localhost:3001/config.json
    ProxyPassReverse /config.json http://localhost:3001/config.json
    


    ProxyPass /serverconfig/ http://localhost:3001/serverconfig/
    ProxyPassReverse /serverconfig/ http://localhost:3001/serverconfig/
    
    # Language files
    ProxyPass /languages/ http://localhost:3001/languages/
    ProxyPassReverse /languages/ http://localhost:3001/languages/
    
    # Images directory
    ProxyPass /images/ http://localhost:3001/images/
    ProxyPassReverse /images/ http://localhost:3001/images
    # TerriaMap route
    ProxyPass /map/ http://localhost:3001/
    ProxyPassReverse /map/ http://localhost:3001/

  # TerriaMap static assets at root level that need to be proxied
    ProxyPass /build/ http://localhost:3001/build/
    ProxyPassReverse /build/ http://localhost:3001/build/

    # Android icons and manifest needed by TerriaMap
    ProxyPass /android-icon-144x144.png http://localhost:3001/android-icon-144x144.png
    ProxyPassReverse /android-icon-144x144.png http://localhost:3001/android-icon-144x144.png
    
    # Favicons for TerriaMap
    ProxyPass /favicons/ http://localhost:3001/favicons/
    ProxyPassReverse /favicons/ http://localhost:3001/favicons/
    
    # Manifest.json for TerriaMap
    ProxyPass /manifest.json http://localhost:3001/manifest.json
    ProxyPassReverse /manifest.json http://localhost:3001/manifest.json
# Handle all other TerriaMap assets at the root level
    ProxyPass /terria.js http://localhost:3001/terria.js
    ProxyPassReverse /terria.js http://localhost:3001/terria.js
    
    # Proxy for v8 API calls including authentication
    ProxyPass /api/ http://localhost:3001/api/
    ProxyPassReverse /api/ http://localhost:3001/api/
    
    # Handle all third-party assets that TerriaMap needs
    ProxyPass /third_party/ http://localhost:3001/third_party/
    ProxyPassReverse /third_party/ http://localhost:3001/third_party/
    
    # Proxy for any potential direct file access
    ProxyPass /init/ http://localhost:3001/init/
    ProxyPassReverse /init/ http://localhost:3001/init/
    
    
    # PGAdmin path
    ProxyPass /pgadmin/ http://localhost:5050/
    ProxyPassReverse /pgadmin/ http://localhost:5050/
    
    # OWS path
    ProxyPass /ows/ http://localhost:8005/
    ProxyPassReverse /ows/ http://localhost:8005/

   # WMS path 
    ProxyPass /wms http://localhost:8005/wms
    ProxyPassReverse /wms http://localhost:8005/wms

    # WMTS path 
    ProxyPass /wmts http://localhost:8005/wmts
    ProxyPassReverse /wms http://localhost:8005/wmts
    
    # WCS path 
    ProxyPass /wcs http://localhost:8005/wcs
    ProxyPassReverse /wms http://localhost:8005/wcs
    
    # Optional GeoServer path (from your existing config)
    ProxyPass /geoserver http://localhost:8080/geoserver
    ProxyPassReverse /geoserver http://localhost:8080/geoserver
    
    # Error Logs
    ErrorLog ${APACHE_LOG_DIR}/desa_error.log
    CustomLog ${APACHE_LOG_DIR}/desa_access.log combined
</VirtualHost>
