# =============================================================
# DESA Platform - NGINX Reverse Proxy Configuration
# =============================================================

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    server_name desalocal.sansa.org.za;

    return 301 https://$host$request_uri;
}

# ---------- Main HTTPS server ----------
server {
    listen 443 ssl;
    server_name desalocal.sansa.org.za;
    client_max_body_size 100M;

    # -------- Document root (DESA UI) --------
    root /var/www;
    index index.html;

    # -------- SSL --------
    ssl_certificate     /etc/nginx/ssl/sansa-public.crt;
    ssl_certificate_key /etc/nginx/ssl/sansa-private.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS - enable ONLY after switching to real hostname with valid cert
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------- Security headers --------
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # -------- Compression --------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # -------- Deny hidden and sensitive files --------
    location ~ /\.(?!well-known) { deny all; }
    location ~ ^/(composer\.(json|lock)|vendor/) { deny all; }

    # =========================================================
    # DESA UI (static frontend under /var/www)
    # =========================================================

    # Cache DESA UI static assets (scoped to /assets/ so proxied
    # apps like Explorer / Jupyter / Terria are unaffected)
    location ~* ^/assets/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Frontend routing: try file, then file.html, then dir, else 404
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Health check
    location /health {
        default_type text/plain;
        return 200 'DESA System Operational';
    }

    # =========================================================
    # ODC Explorer  ->  /products/
    # =========================================================
    location /products {
        proxy_pass http://desa-explorer:8080/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explorer expects /static and /_theme at root
    location ~ ^/(static|_theme)/ {
        proxy_pass http://desa-explorer:8080$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================
    # JupyterHub  ->  /compute/
    # =========================================================
    location /compute/ {
        proxy_pass http://jupyterhub:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name     /compute;

        # WebSocket support for notebooks
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location ~ ^/compute/(api|login|logout|user|services|static|oauth|hub|login-hub|logout-hub|metrics|proxy) {
        proxy_pass http://jupyterhub:8000$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name     /compute;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # =========================================================
    # TerriaMap  ->  /map/
    # =========================================================
    location /map/ {
        proxy_pass http://map:3001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
    # --- Root-level config files (exact match) ---
    location = /config.json        { proxy_pass http://map:3001/config.json;       include /etc/nginx/conf.d/terria_proxy.inc; }
    location = /serverconfig.json  { proxy_pass http://map:3001/serverconfig.json; include /etc/nginx/conf.d/terria_proxy.inc; }
    location = /version.js         { proxy_pass http://map:3001/version.js;        include /etc/nginx/conf.d/terria_proxy.inc; }
    location = /manifest.json      { proxy_pass http://map:3001/manifest.json;     include /etc/nginx/conf.d/terria_proxy.inc; }
    location = /ping               { proxy_pass http://map:3001/ping;              include /etc/nginx/conf.d/terria_proxy.inc; }

    # --- Static asset directories ---
    location /build/               { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /images/              { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /doc/                 { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /favicons/            { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /fonts/               { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /languages/           { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /schema/              { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    #location /help/                { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }

    # --- Configuration & catalog init files ---
    location /init/                { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /serverconfig/        { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }

    # --- Runtime APIs ---
    location /api/                 { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /proxy/               { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /proxyabledomains/    { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /convert/             { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /share/               { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /feedback/            { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }

    # --- Cesium (used by 3D globe view) ---
    location /Cesium/              { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /Workers/             { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /Assets/              { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }
    location /ThirdParty/          { proxy_pass http://map:3001; include /etc/nginx/conf.d/terria_proxy.inc; }



    # =========================================================
    # OWS  ->  /ows/
    # =========================================================
    location /ows/ {
        proxy_pass http://desa-ows:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ows;
        proxy_set_header X-Script-Name     /ows;
    }
}